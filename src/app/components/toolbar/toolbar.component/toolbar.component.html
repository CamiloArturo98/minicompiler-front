<header class="flex items-center justify-between px-6 py-3 border-b border-[var(--color-border)] bg-[var(--color-surface)]">

      <!-- Brand -->
      <div class="flex items-center gap-3 animate-fade-up">
        <div class="w-8 h-8 rounded-lg bg-[var(--color-amber)] flex items-center justify-center glow-amber">
          <span class="text-black font-bold text-xs leading-none">⟨/⟩</span>
        </div>
        <div>
          <h1 class="font-['Syne'] font-800 text-sm text-[var(--color-text)] tracking-wider uppercase leading-none">
            MiniCompiler
          </h1>
          <p class="text-[10px] text-[var(--color-text-mute)] tracking-widest uppercase leading-none mt-0.5">
            VM Studio v1.0
          </p>
        </div>
      </div>

      <!-- Center: Examples -->
      <div class="flex items-center gap-1 animate-fade-up delay-100">
        <span class="text-[10px] text-[var(--color-text-mute)] uppercase tracking-widest mr-2">Examples</span>
        @for (ex of exampleKeys; track ex) {
          <button
            (click)="loadExample.emit(ex)"
            class="px-3 py-1.5 text-[11px] text-[var(--color-text-dim)] border border-[var(--color-border)]
                   rounded hover:border-[var(--color-amber)] hover:text-[var(--color-amber)]
                   transition-all duration-200 font-mono tracking-wide">
            {{ examples[ex].label }}
          </button>
        }
      </div>

      <!-- Right: Options + Run -->
      <div class="flex items-center gap-4 animate-fade-up delay-200">

        <!-- Toggles -->
        <div class="flex items-center gap-3">
          @for (opt of optionList; track opt.key) {
            <label class="flex items-center gap-1.5 cursor-pointer group">
              <div class="relative w-7 h-4 rounded-full transition-colors duration-200"
                   [class.bg-amber-500]="options()[opt.key]"
                   [class.bg-zinc-700]="!options()[opt.key]">
                <div class="absolute top-0.5 w-3 h-3 rounded-full bg-white shadow transition-transform duration-200"
                     [class.left-0.5]="!options()[opt.key]"
                     [class.left-3.5]="options()[opt.key]">
                </div>
                <input type="checkbox" class="sr-only"
                       [checked]="options()[opt.key]"
                       (change)="toggleOption.emit(opt.key)">
              </div>
              <span class="text-[11px] text-[var(--color-text-mute)] group-hover:text-[var(--color-text-dim)]
                           transition-colors uppercase tracking-wider">
                {{ opt.label }}
              </span>
            </label>
          }
        </div>

        <!-- Run button -->
        <button
          (click)="run.emit()"
          [disabled]="loading()"
          class="flex items-center gap-2 px-5 py-2 rounded-lg font-mono font-semibold text-sm
                 bg-[var(--color-amber)] text-black
                 hover:bg-amber-400 active:scale-95
                 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-all duration-200 glow-amber shadow-lg">
          @if (loading()) {
            <svg class="w-4 h-4 animate-spin-slow" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
            <span>Running...</span>
          } @else {
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <ng-content></ng-content>
            <span>Run</span>
            <kbd class="text-[9px] bg-black/20 px-1.5 py-0.5 rounded font-mono">⌘↵</kbd>
          }
        </button>
      </div>
    </header>
  `
